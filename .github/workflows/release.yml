name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/silverlining.jks"

      - name: Build release APK
        env:
          storeFile: ${{ runner.temp }}/silverlining.jks
          storePassword: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          keyAlias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          chmod +x android/gradlew
          android/gradlew -p android assembleRelease

      - name: Rename APK with version + timestamp
        run: |
          VERSION=$(grep '^silverliningVersion=' android/gradle.properties | cut -d= -f2)
          TIMESTAMP=$(date -u +"%Y.%m.%dT%H.%M.%SZ")
          mv android/app/build/outputs/apk/release/app-release.apk \
             "android/app/build/outputs/apk/release/silverlining-v${VERSION}+${TIMESTAMP}.apk"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: silverlining-apk
          path: android/app/build/outputs/apk/release/silverlining-*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/silverlining-*.apk
          generate_release_notes: true
